name: AgentPower checks

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  agentpower:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run agentpower:doctor
      - run: npm run lint --if-present
      - run: npm run build --if-present
